name: Publish Image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Build container image
        run: nix build .#container-image

      - name: Load image and scan with vulnix
        run: |
          IMAGE_NAME=$(docker load < result | grep 'Loaded image:' | awk '{print $NF}')
          [[ -n "$IMAGE_NAME" ]] || { echo "ERROR: could not determine loaded image name" >&2; exit 1; }
          if ! [[ "$IMAGE_NAME" =~ ^agent-sandbox:[a-zA-Z0-9._-]+$ ]]; then
            echo "ERROR: unexpected image name format: '$IMAGE_NAME'" >&2; exit 1
          fi
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          # vulnix is advisory-only during early development; failures do not block the push.
          # TODO: make vulnix blocking once the initial advisory backlog is triaged.
          nix run nixpkgs#vulnix -- "$(nix path-info .#container-image)" || true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag "$IMAGE_NAME" "ghcr.io/mstruble/agent-sandbox:${{ github.sha }}-amd64"
          docker push "ghcr.io/mstruble/agent-sandbox:${{ github.sha }}-amd64"

  # TODO: Add a native ARM64 runner job here when one is available.
  # A cross-compiled arm64 image from an x86_64 runner would be mislabeled,
  # so ARM64 support is deferred until a native runner (e.g. self-hosted arm64)
  # is configured. Open a tracking issue and link it here when scheduling this work.

  manifest:
    name: Create Manifest
    needs: [build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create \
            ghcr.io/mstruble/agent-sandbox:${{ github.sha }} \
            --amend ghcr.io/mstruble/agent-sandbox:${{ github.sha }}-amd64
          docker manifest push ghcr.io/mstruble/agent-sandbox:${{ github.sha }}
