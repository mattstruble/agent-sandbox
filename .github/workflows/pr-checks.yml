name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Check nixfmt formatting
        run: nix run nixpkgs#nixfmt -- --check flake.nix packages/*.nix

      - name: Validate flake
        run: nix flake check

      - name: ShellCheck
        run: nix develop --command bash -c "shellcheck agent-sandbox.sh entrypoint.sh init-firewall.sh && shellcheck -s sh install.sh"

      - name: Validate PR title (conventional commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Build container image
        run: nix build .#container-image

      - name: Load image into Docker
        run: docker load < result

      - name: Scan with vulnix
        run: nix run nixpkgs#vulnix -- "$(nix path-info .#container-image)"
        # vulnix is advisory-only during early development; failures do not block PRs.
        # TODO: remove continue-on-error once the initial advisory backlog is triaged.
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Run test suite
        run: nix develop --command bash -c 'RUNTIME=docker make test'

  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Build Nix package
        run: nix build
