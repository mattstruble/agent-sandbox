name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Check nixfmt formatting
        run: nix run nixpkgs#nixfmt -- --check flake.nix

      - name: Validate flake
        run: nix flake check

      - name: ShellCheck
        run: nix-shell -p shellcheck --run "shellcheck agent-sandbox.sh entrypoint.sh init-firewall.sh && shellcheck -s sh install.sh"

      - name: Validate PR title (conventional commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Build container image
        run: docker build -f Containerfile -t agent-sandbox:ci-test .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: agent-sandbox:ci-test
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Tag image with content hash
        run: |
          IMAGE_HASH=$(sha256sum Containerfile | cut -c1-64)
          [[ -n "$IMAGE_HASH" ]] || { echo "ERROR: IMAGE_HASH is empty"; exit 1; }
          docker tag agent-sandbox:ci-test "agent-sandbox:${IMAGE_HASH}"

      - name: Run test suite
        run: nix develop --command bash -c 'RUNTIME=docker make test'

  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Build Nix package
        run: nix build
